<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Nsisong Ekwere Akpakpan">
    <meta name="description"
      content="This page contain contact informatiom for the Water Rafting Company">
    <link rel="stylesheet" href="styles/rafting.css">
    <title>Contact Us Page</title>
</head>

<body>
    <header class="grid">
        <img src="images/z-therapidssplash.jpg" alt="rafting Logo">
        <nav>
            <ul class="flex">
                <li> <a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li> <a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div>
            <h1 class="contact-heading">White Water Rafting Company</h1>
            <div class="contact-info">
                123 Main River Street <br>Kolobo, California <br>+1 999 999 9999
                <br>info@whitewater.com
            </div>
        </div>
        <div class="contact">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6512776.385881339!2d-124.61014886894192!3d37.15111599472902!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808fb9fe5f285e3d%3A0x8b5109a227086f55!2sCalifornia%2C%20USA!5e0!3m2!1sen!2sng!4v1775201328494!5m2!1sen!2sng"
              width="400" height="300" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>

            <div class="contact-form-div">
                <form class="contact-form">
                    <div class="form-item purpose">
                        <label for="name">Name: </label>
                        <input type="text" id="name" name="name">
                    </div>
                    <div class="form-item purpose">
                        <label for="email">Email: </label>
                        <input type="email" id="email" name="email">
                    </div>
                    <div class="form-item">
                        <div class="purpose">
                            <label>Message <br>Purpose: </label>
                            <div>
                                <input type="radio" id="option1" name="option"
                                  value="General Inquire">
                                <label for="option1">General Inquire</label><br>

                                <input type="radio" id="option2" name="option"
                                  value="Reservation Question">
                                <label for="option2">Reservation Question</label> <br>
                                <input type="radio" id="option3" name="option"
                                  value="Website Suggestion">
                                <label for="option3">Website Suggestion</label>
                            </div>
                        </div>

                        <div class="form-item">
                            <label for="message">Message: </label><br>
                            <textarea name="message" id="message" rows="3"
                              placeholder="type here"></textarea>
                        </div>
                        <div class="form-item">

                            <input type="checkbox" name="subsribtion" id="subsribtion">
                            <label for="subsribtion">Please Subsribe me to the monthly newsleter
                            </label>
                        </div>
                        <button type="submit">Get in Touch!</button>
                    </div>

                </form>
            </div>
        </div>
        <section class="employee-profile">
            <h2>We Are Here to Serve You</h2>
            <div class="adventure">
                <figure>
                    <img src="images/rafting10_1024.jpg" alt="Los Dientes del Diablo">
                    <figcaption>Employee Profile </figcaption>
                </figure>
                <figure>
                    <img src="images/rafting119_600.jpg" alt="Big Mallard">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/rafting19_600.jpg" alt="Half Day Adventure">
                    <figcaption>Employee Profile</figcaption>
                </figure>

            </div>
        </section>

    </main>
    <footer class="grid">
        <p>&copy; 2026 Rafting Company | Created by Nsisong Ekwere Akpakpan</p>
        <nav class="socialmedia">
            <a href="www.instagram.com"><img src="images/icons/heart_10976235.jpg"
                  alt="Instagram Icon"></a>
            <a href="https://web.facebook.com/"><img src="images/icons/facebook-logo_1384863.jpg"
                  alt="Facebook Icon"></a>
            <a href="www.linkedin.com"><img src="images/icons/linkedin_3991775.jpg"
                  alt="Linkin Icon"></a>
        </nav>

    </footer>

</body>

</html>
