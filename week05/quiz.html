<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main>
        <h1>Basic HTML and CSS Quiz</h1>
        <form>
            <div class="form-item">
                <label for="q1">1. What does the acronym CSS stand for</label>
                <input type="text" id="qi" name="q1" required>
            </div>
            <br>
            <div class="form-item">
                <label for="q2">2. How are id and class attribute selected in CSS?</label>
                <textarea name="q2" id="q2" rows="4" placeholder=""></textarea>
            </div><br>
            <div class="form-item">
                <label for="q3">3. Which of the following is a valid CSS comment?</label>
                <select name="q3" id="q3">
                    <option value="">Choose One ...</option>
                    <option value="a">// This is a CSS comment</option>
                    <option value="b">&lt;!-- This is a CSS comment
                        --&gt;
                    </option>
                    <option value="c">/* This is a CSS comment */</option>
                    <option value="d">** This is a CSS comment **</option>
                </select>
            </div>
            <br>
            <div class="form-item">
                <label for="q4"> 4. How many levels of heading do we have in HTML?</label>
                <input type="number" name="q4" id="q4">
            </div>
            <button type="submit">Submit Quiz</button>
        </form>
    </main>
</body>

</html>
