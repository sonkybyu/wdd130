<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form Pool</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <h1>WDD 130 | HTML Form - User Poll</h1>
    <form>

        <fieldset>
            <legend>Personal Information</legend>
            <div class="form-item column2"><label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>
            <div class="form-item column2">
                <label for="useremail">Email:</label>
                <input type="email" id="useremail" name="useremail" required>
            </div><br>
        </fieldset>
        <fieldset class="second">
            <legend>Question</legend>
            <div class="form-item column1"><label for="f-browser">What is Your Favorite Internet
                    Browser</label>
                <select name="browser" id="browser">
                    <option value="chrome">Chrome</option>
                    <option value="safari">Safari</option>
                    <option value="edge">Edge</option>
                    <option value="brave">Brave</option>
                </select>
            </div>
            <div class="form-item column1"><label for="pet">Do you have a household pet?</label>
                <input type="checkbox" name="pet" id="pet">
            </div>
            <div class="form-item text-area-label"><label for="feedback">List the places you have
                    lived.</label>
                <textarea name="feedback" id="feedback" rows="4"
                  placeholder="Stillwater Florida, Amsterdam Netherlands, Timbuktu Mali"></textarea>
            </div>
        </fieldset>
        <button type="submit">Submit Poll</button>
    </form>
</body>

</html>
